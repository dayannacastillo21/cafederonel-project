spring.datasource.url=jdbc:h2:mem:cafedronel_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.locations=classpath:db/migration,classpath:db/vendor/{vendor}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=TestOnlyJwtSecretForCafedronelWithAtLeastThirtyTwoBytes
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:5500
app.pedidos.admin-pin=4444
