spring.application.name=backend-cafedronel
server.port=${PORT:8081}

# Configuracion local segura. En Render/produccion define estas variables en el panel Environment.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventario_backenddatabase}?sslmode=${DB_SSLMODE:disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

app.jwt.secret=${JWT_SECRET:CafedronelLocalDevJwtSecretChangeMe32Bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:5500,http://127.0.0.1:5500}
app.pedidos.admin-pin=${PEDIDOS_ADMIN_PIN:4444}
